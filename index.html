function roleStages(r){ return r.n.split('·').map(s=>s.trim()); }
function roleCat(modeId, r){
  const st = roleStages(r);
  if(st.length>1) return {label:`Évolutif · ${st.length} stades`, key:'evo'};

}
function roleCard(modeId, idx){
  const r = DATA[modeId].roles[idx], a = ACC[modeId];
  const st = roleStages(r), evo = st.length>1;
  const cat = roleCat(modeId, r);
  const head = evo
    ? `<div class="flex flex-wrap items-center gap-x-1.5 gap-y-0.5 font-medium leading-snug">${st.map((s,i)=>`${i?'<span class="faint text-xs">→</span>':''}<span>${esc(s)}</span>`).join('')}</div>`
    : `<h4 class="font-medium leading-snug">${esc(r.n)}</h4>`;
  const meta = modeId==='pokemon' ? `${cat.label}${r.hp?` · ${esc(r.hp)}`:''}` : '';
  return `<a href="#/role/${modeId}/${idx}" class="card rounded-xl p-5 ring-soft block">

      ${head}
      <span class="shrink-0 text-[11px] font-medium px-2 py-0.5 rounded-md muted border bd surface-2">${esc(r.ev)}</span>

  </a>`;
}

const FILTER = {pokemon:{camp:'all',cat:'all'}, valkyrie:{camp:'all',cat:'all'}, naruto:{camp:'all',cat:'all'}};
function markActive(containerId, btn){
  const c=document.getElementById(containerId); if(!c||!btn)return;
  c.querySelectorAll('[role=tab]').forEach(b=>b.setAttribute('aria-selected','false'));
  btn.setAttribute('aria-selected','true');
}
function setCamp(modeId, key, btn){ FILTER[modeId].camp=key; markActive('tabs-'+modeId, btn); renderRoles(modeId); }
function setCat(modeId, cat, btn){ FILTER[modeId].cat=cat; markActive('cat-'+modeId, btn); renderRoles(modeId); }
function renderRoles(modeId){
  const f = FILTER[modeId] || {camp:'all',cat:'all'};
  const q = (document.getElementById('search-'+modeId)?.value || '').toLowerCase().trim();
  let list = DATA[modeId].roles.map((r,i)=>({r,i}));
  if(f.camp!=='all') list = list.filter(o=>o.r.camp===f.camp);
  if(modeId==='pokemon' && f.cat!=='all') list = list.filter(o=>roleCat(modeId,o.r).key===f.cat);
  if(q) list = list.filter(o=>{ const r=o.r; return (r.n+' '+r.t+' '+r.ev+' '+(r.d||'')+' '+(r.pw||[]).join(' ')+' '+(r.passif||'')).toLowerCase().includes(q); });
  // organise par évolution : les lignées évolutives d'abord (par nb de stades), puis alpha
  list.sort((x,y)=>{ const sx=roleStages(x.r).length, sy=roleStages(y.r).length; return sy-sx || x.r.n.localeCompare(y.r.n); });
  const grid = document.getElementById('grid-'+modeId); if(!grid) return;
  grid.innerHTML = list.map(o=>roleCard(modeId,o.i)).join('') || `<p class="muted col-span-full text-sm py-8 text-center">Aucun rôle ne correspond à ta recherche.</p>`;
  const c = document.getElementById('count-'+modeId); if(c) c.textContent = list.length + ' rôle' + (list.length>1?'s':'');
  observe();
}
function route(){
  const h = (location.hash||'#/').replace(/^#/,'');
  const p = h.split('/').filter(Boolean); // ['mode','pokemon']...
  let html, navKey='';
  if(p.length===0){ html=viewHome(); }
  else if(p[0]==='modes'){ html=viewModes(); navKey='modes'; }
  else if(p[0]==='mode'&&p[1]){ html=viewMode(p[1]); navKey=p[1]; }
  else if(p[0]==='role'&&p[1]&&p[2]!=null){ html=viewRole(p[1],parseInt(p[2],10)); navKey=p[1]; }
  else if(p[0]==='arena'){ html=viewArena(); navKey='arena'; }
  else if(p[0]==='wiki'){ html=viewWiki(); navKey='wiki'; }
  else html=view404();
  app().innerHTML = html;
  document.querySelectorAll('[data-spy]').forEach(a=>a.classList.toggle('active', a.dataset.spy===navKey));
  // filtres réinitialisés sur une page de mode
  if(p[0]==='mode'&&DATA[p[1]]){ FILTER[p[1]]={camp:'all',cat:'all'}; renderRoles(p[1]); }
  window.scrollTo(0,0);
  observe();
}
window.addEventListener('hashchange', route);

function copyIP(btn){ navigator.clipboard.writeText(SERVER_IP).catch(()=>{}); const l=btn.querySelector('.ip-label')||(btn.classList.contains('ip-label')?btn:null); if(!l)return; const o=l.textContent; l.textContent='IP copiée ✓'; setTimeout(()=>l.textContent=o,1500); }
function observe(){ // révélation fiable au rendu (stagger léger), indépendante du scroll
  const els=[...document.querySelectorAll('.reveal:not(.in)')];
  els.forEach((e,i)=>setTimeout(()=>e.classList.add('in'), Math.min(i*45,260)));
}
