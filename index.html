<style>

  html.dark{
    --bg:#0c0c0e;--surface:#141417;--surface-2:#1b1b1f;--text:#ececef;--muted:#a0a09a;--faint:#6e6e74;
    --border:#26262b;--accent:#34d399;--accent-soft:#11241d;--pk:#34d399;--vk:#f0a93a;--nr:#f2703c;
  }
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;letter-spacing:-.011em}
  ::selection{background:color-mix(in srgb,var(--accent) 30%,transparent)}
  .font-serif{font-family:'Fraunces',Georgia,serif}
  .surface{background:var(--surface)}.surface-2{background:var(--surface-2)}
  .muted{color:var(--muted)}.faint{color:var(--faint)}.accent{color:var(--accent)}
  .bd{border-color:var(--border)}.bd-t{border-top:1px solid var(--border)}.bd-b{border-bottom:1px solid var(--border)}
  .ring-soft{box-shadow:0 1px 2px rgba(0,0,0,.04)}html.dark .ring-soft{box-shadow:0 1px 0 rgba(255,255,255,.03)}
  .card{background:var(--surface);border:1px solid var(--border);transition:border-color .2s,transform .2s}
  .card:hover{border-color:color-mix(in srgb,var(--accent) 45%,var(--border));transform:translateY(-2px)}
  .btn{transition:background .18s,color .18s,border-color .18s,transform .12s}.btn:active{transform:translateY(1px)}
  .reveal{opacity:0;transform:translateY(14px);transition:opacity .55s cubic-bezier(.2,.7,.2,1),transform .55s cubic-bezier(.2,.7,.2,1)}
  .reveal.in{opacity:1;transform:none}
  .navlink{color:var(--muted);transition:color .18s}.navlink:hover{color:var(--text)}.navlink.active{color:var(--text)}
  .navlink.active::after{content:'';display:block;height:2px;border-radius:2px;background:var(--accent);margin-top:5px}
  .pilltab{border:1px solid var(--border);color:var(--muted);background:var(--surface)}
  .pilltab[aria-selected="true"]{color:var(--text);border-color:color-mix(in srgb,var(--accent) 50%,var(--border));background:var(--accent-soft)}
  .hairline{background:linear-gradient(90deg,transparent,var(--border),transparent)}
  details>summary{list-style:none;cursor:pointer}details>summary::-webkit-details-marker{display:none}
  details[open] .chev{transform:rotate(180deg)}.chev{transition:transform .25s}
  .dot{width:7px;height:7px;border-radius:9999px;display:inline-block}
  .rolechip{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:2px 8px;border-radius:7px;background:var(--surface-2);border:1px solid var(--border);color:var(--muted);white-space:nowrap}
  .line-clamp-3{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .campbar{width:6px;border-radius:9999px;align-self:stretch;min-height:38px}
  .camphead{position:sticky;top:64px;z-index:10;background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(8px)}

const POKE_ROLES = [
  /* ── CONSEIL DES MAÎTRES (Safe) ── */
  {camp:"conseil",n:"Sacha",t:"Le Dresseur (Leader)",ev:"Dresseur · Normal",hp:"12 ♥",passif:"L'Aura du Champion : Force I (+20 % dégâts) aux alliés du Village à moins de 15 blocs. À sa mort, tout le Village subit Faiblesse I 3 min (le Deuil).",d:"Le chef du Conseil. Il capture Pikachu dans sa Pokéball pour le mettre en sécurité, le ressort au bon moment et frappe en duo synchronisé.",pw:["Pokéball (duo Pikachu) — clic droit sur Pikachu (<3 blocs, il Shift pour accepter) → il passe spectateur lié (gelé, invisible, en sécurité)","Tonnerre synchro (Casquette) — seulement si Pikachu est dans la ball : éclair sur cible <20 blocs → 3♥ bruts + perte de sprint + Lenteur III 3s ; Pikachu S3 gagne +15 % de jauge Méga [CD:45s]","Pop Surprise — clic droit dans le vide : Pikachu sort 5 blocs devant « Je te choisis ! » (Vitesse III + Force I 5s, ou éclair de zone si Raichu)","Le Sac de Sacha — 2 Hyper Potions (Régén III 5s) + 1 Super Bonbon (+25 % d'évolution à un allié S1/S2) [CD:1200s]"],lien:"Duo avec Pikachu : pseudos connus dès le départ, chat privé permanent, Vengeance si l'un meurt.",fb:"Faible seul, cible n°1 ; son Tonnerre dépend de Pikachu."},
  {camp:"conseil",n:"Pichu · Pikachu · Raichu",t:"Le Détective",ev:"Électrik",hp:"8 → 10 → 12 ♥",passif:"Type Électrik : +15 % de dégâts sous Pluie/Orage, −10 % sous Tempête de Sable. Deux objets de départ : la boussole Radar Électrique (s'améliore par stade) et le bâton Attaque Électrique (Décharge → Cage → Tonnerre). Statik (Pichu) : Vitesse I (+20 %), tes coups infligent une brève Lenteur I. Statik amélioré (Pikachu) : Vitesse II (+40 %), Lenteur II. Vitesse Absolue (Raichu) : Vitesse III (+60 %) + 20 % de casser le sprint ennemi.",d:"Le traqueur du Village : un radar qui s'affine à chaque stade et des décharges qui montent jusqu'au vrai éclair.",pw:["Radar Électrique (Pichu) — boussole : direction (floue) du joueur le plus proche","Petite Décharge (Pichu) — 0,5♥ à distance + micro-freeze [CD:60s]","Radar de Faction (Pikachu) — direction + révèle si la cible est Rocket ou Galaxie","Cage-Éclair (Pikachu) — 1♥ + EMPRISONNÉ 2s : immobile, saut bloqué, ramené au centre s'il tente de sortir [CD:45s]","Radar de Chasse (Raichu) — direction + faction + distance exacte en blocs","Tonnerre (Raichu) — vrai éclair : 2,5♥ bruts + brûlure + paralysie [CD:30s]","Coup de Jus Global (Méga) — frappe la cible ET ses alliés à 5 blocs [CD:10s]"],combo:"Méga-Raichu (2 min) : Vitesse IV + Force I + Coup de Jus Global (frappe la cible ET ses alliés à 5 blocs).",lien:"Duo Sacha : évolution ×2 près de lui ; 10 min de lien → Raichu Spécial. ⚠ Corruptible par Giovanni (brise le duo).",fb:"Fragile, dépendant de Sacha, proie de la quête Rocket."},
  {camp:"conseil",n:"Salamèche · Reptincel · Dracaufeu",t:"Lignée Dracaufeu",ev:"Feu / Vol",hp:"8 → 10 → 12 ♥",passif:"Type Feu/Vol : +15 % sous Soleil & Orage, −10 % sous Pluie. Immunité au Feu/Lave. Deux objets : la Poudre de Blaze (souffles de feu) et la Griffe Tranchante (coups brise-armure). Fire Aspect (dès Reptincel) : tes coups d'épée enflamment 3 s. Dracaufeu : Vitesse I (+20 %).",d:"Lignée offensive : ses attaques de feu montent en puissance, il dash pour briser l'armure puis prend les airs.",pw:["Boule de Feu (Salamèche) — projectile : 1♥ + enflamme la cible (8 blocs) [CD:75s]","Griffe (Salamèche) — coup corps-à-corps : 1♥ brut + entame l'armure [CD:120s]","Lance-Flammes (Reptincel) — 2♥ + enflamme (10 blocs) [CD:75s]","Griffe Acier (Reptincel) — dash 15 blocs : 2♥ bruts + brise-armure [CD:120s]","Fournaise (Dracaufeu) — 3♥ + enflamme + anti-soin 5s [CD:75s]","Tranche-Air (Dracaufeu) — dash 25 blocs : 2♥ bruts + brise-armure + Cécité 3s [CD:120s]","Méga-Dracaufeu (Méga) — Force I + Résistance I + VOL pendant 10 s"],combo:"Méga-Dracaufeu (Gemme) : Force I + Résistance I + vol pendant 10 s.",fb:"8♥ très fragile au Stade 1 ; −10 % sous Pluie ; inefficace contre les ignifugés."},
  {camp:"conseil",n:"Carapuce · Carabaffe · Tortank",t:"La Forteresse Aquatique",ev:"Eau",hp:"8 → 10 → 12 ♥",passif:"Type Eau : +15 % sous Pluie, −10 % au Soleil. PUR TANK — aucune Vitesse. Carapace : immunité au recul quand tu te protèges (Shift). Deux objets : le Piston (jets d'eau) et l'Étoile (défenses). Résistance I (%) dès Carabaffe ; Depth Strider I→II ; pas de noyade à Tortank. Astuce : une attaque qui ne touche personne voit son cooldown retomber à 5 s.",d:"La muraille du Village : jets d'eau croissants, dash tourbillon et une Méga dévastatrice en zone.",pw:["Pistolet à O (Carapuce) — ligne d'eau 6 blocs : 1♥ + recul 3 blocs (1er touché) [CD:50s]","Repli (Carapuce) — Résistance II 3s, mais immobile [CD:80s]","Bulle d'O (Carabaffe) — 3 vagues : 0,5♥ chacune + Lenteur cumulable (jusqu'à III) [CD:50s]","Abri (Carabaffe) — bouclier d'eau 4s : 100 % immunisé aux flèches & perles [CD:80s]","Hydrocanon (Tortank) — torrent 15 blocs : 3♥ + KB massif 6 blocs (sprint cassé si mur) [CD:50s]","Tour Rapide (Tortank) — dash sur cible 20 blocs : 2♥ bruts + onde repoussant ses alliés [CD:80s]","Méga-Tortank (Méga) — Force I + Geyser Géant + gèle le sol sur 30 % des coups reçus"],combo:"Méga-Tortank (Gemme) : Force I + Geyser Géant + gèle le sol sur 30 % des coups reçus.",fb:"Lent (aucune Vitesse) ; −10 % au Soleil ; dépend du placement."},
  {camp:"conseil",n:"Bulbizarre · Herbizarre · Florizarre",t:"Le Maître des Toxines",ev:"Plante / Poison",hp:"8 → 10 → 12 ♥",passif:"Type Plante/Poison : +15 % sous Pluie, −15 % au Feu. Immunité au Wither, Poison reçu plafonné (max I). Deux objets : le Soufre (poudres) et la Liane (racines). Florizarre : Régénération I + Riposte épineuse (15 % des coups reçus → Lenteur I 3 s à l'attaquant).",d:"Le maître des toxines : poudres handicapantes, vol de vie et immobilisation de zone.",pw:["Poudre Dodo (Bulbizarre) — projectile : Lenteur III 3s (1er touché) [CD:45s]","Fouet Lianes (Bulbizarre) — 1♥ brut sur une cible à 6 blocs [CD:75s]","Poudre Toxik (Herbizarre) — projectile : Poison I 6s [CD:45s]","Racines Enveloppantes (Herbizarre) — dash 15 blocs : 1,5♥ + Lenteur IV 2s [CD:75s]","Tempête de Poudre (Florizarre) — zone 5 blocs : Poison I + Lenteur II 5s [CD:45s]","Vampigraine (Florizarre) — dash 25 blocs : 2♥ + vole 1,5♥ [CD:75s]","Méga-Florizarre (Méga) — Force I + Régén + Isograisse (−50 % Feu/Glace) + Explosion de Spores (Poison II, 8 blocs)"],combo:"Méga-Florizarre (Gemme) : Force I + Régén + Isograisse (−50 % Feu/Glace) + Explosion de Spores (Poison II, 8 blocs).",fb:"−15 % au Feu ; pas de Résistance ; fragile (8♥) au Stade 1."},
  {camp:"conseil",n:"Arcko · Massko · Jungko",t:"Lignée Jungko",ev:"Plante",hp:"8 → 10 → 12 ♥",passif:"Type Plante : +15 % sous Soleil, −15 % sous Sable & Feu. Vitesse I (+20 %) dès Massko ; Jungko : Vitesse I + Jump Boost I. Vol de vie sur ses attaques. Deux objets : les Graines (zone de drain) et la Canne à Sucre (dash dans le dos).",d:"L'assassin végétal : il draine la vie, frappe dans le dos et disparaît.",pw:["Vol-Vie (Arcko) — zone autour de toi : 1♥ aux ennemis + tu te soignes [CD:45s]","Coupe (Arcko) — coup rapide : 1♥ brut + entame l'armure [CD:90s]","Giga-Sangsue (Massko) — zone 4 blocs : 1♥/ennemi + soin par cible touchée [CD:45s]","Lame-Feuille (Massko) — dash DANS LE DOS 15 blocs : 2♥ bruts + Cécité 2s (coupe le sprint) [CD:90s]","Tempête Verte (Jungko) — zone : 2♥ + Lenteur II aux ennemis + soin [CD:45s]","Lame-Feuille Évoluée (Jungko) — dash dos 25 blocs : 3,5♥ bruts + Cécité + Poison II 5s [CD:90s]","Méga-Jungko (Méga) — Force I + Invisibilité 8s (pas de Résistance)"],combo:"Méga-Jungko (Gemme) : Force I + Invisibilité 8 s.",fb:"Très fragile (8♥) ; doublement faible Sable + Feu ; squishy même en Méga."},
  {camp:"conseil",n:"Chenipan · Chrysacier · Papilusion",t:"La Lignée Botanique",ev:"Insecte / Plante",hp:"7 → 10 → 11 ♥",passif:"Type Insecte/Plante : +15 % sous Pluie, −15 % au Feu. Papilusion : immunité aux dégâts de chute. Les graines posées éclosent en Fleurs Magiques une fois Papilusion. Objets : les Graines, la Ficelle, la Pousse, la Rose (menu de Fleurs) et la Plume.",d:"Le piégeur botanique : il prépare le terrain avec des graines invisibles qui, devenu Papilusion, deviennent des Fleurs de combat.",pw:["Plantation de Graine (Chenipan) — pose une graine (max 3) qui éclora en Fleur [CD:20s]","Sécrétion Collante (Chenipan) — jet de sève : Lenteur II 3s [CD:30s]","Enracinement (Chrysacier) — immobile 4s : Résistance III ; un ennemi qui marche sur tes graines subit Lenteur III [CD:45s]","Fleurs (Papilusion) — Rose → menu : Fleur Feu (cercle de feu/brûlure), Fleur Eau (Régén alliés, soin ennemis −20%), Fleur Paralysie (coupe le sprint) [CD:45s]","Bourrasque de Pollen (Papilusion) — KB vertical ; traverse une Fleur → vague d'effet sur 15 blocs [CD:40s]","/poke jump (Papilusion) — active/désactive ton Jump Boost IV illimité (vol papillon)"],combo:"Bourrasque de Pollen traversant une Fleur → projette son effet en vague sur 15 blocs.",fb:"Fragile (7♥) avant l'éclosion ; −15 % au Feu ; dépend du placement des graines."},
  {camp:"conseil",n:"Ptiravi · Leveinard · Leuphorie",t:"Le Soigneur",ev:"Normal",hp:"8 → 10 → 12 ♥",passif:"Type Normal — LE SOIGNEUR du Conseil. Faiblesse I permanente (ses coups frappent moins, ce n'est pas un combattant). Leuphorie : Régénération I. Deux objets : l'Œuf (zone de soin) et la Carotte dorée (Don de Vie).",d:"Le support du Village : il maintient son équipe en vie au prix de sa propre puissance offensive.",pw:["Œuf Chance (Ptiravi) — zone de soin 1♥/s, 4 blocs, 4s (alliés) [CD:40s]","Don de Vie (Ptiravi) — −2♥ à toi → +3♥ à un allié visé [CD:15s]","Œuf Chance (Leveinard) — zone de soin 1,5♥/s, 5 blocs, 5s [CD:40s]","Don de Vie (Leveinard) — −2♥ → +4♥ à un allié [CD:15s]","Œuf Chance (Leuphorie) — zone de soin 2♥/s, 6 blocs, 6s + Régén alliés [CD:40s]","Don de Vie (Leuphorie) — −2♥ → +5♥ à un allié [CD:15s]"],fb:"Faiblesse I (coups réduits) ; dépend de son équipe ; cible prioritaire à protéger."},
  {camp:"conseil",n:"Morphéo",t:"Le Caméléon du Serveur",ev:"Normal",hp:"12 ♥",passif:"S'adapte à la météo en cours (bonus permanents). Invisibilité totale, armure comprise, la nuit en s'accroupissant.",d:"Le caméléon : sa puissance change avec le climat, et il peut imposer les malus de la météo à ses ennemis.",pw:["Bonus selon la météo (Vitesse + immunité feu, Régén, Force, Résistance…)","Interrupteur de zone — inflige les malus météo aux ennemis (8 blocs)","Ball'Météo — projectile à effet variable selon le climat"],fb:"Affaibli en plein jour clair ; dépend de la météo."},
  {camp:"conseil",n:"Goinfrex · Ronflex",t:"Le Glouton",ev:"Normal",hp:"12 → 14 ♥",passif:"Type Normal (météo-neutre). Gloutonnerie : clic-gauche main vide sur un bloc faible (<3 de dureté) → il disparaît et te donne un buff 1 min (Cobblestone → Résistance I · Terre → Force I) ; manger un 2e bloc trop tôt → Lenteur I. Ronflex : Lenteur I + Résistance I (tank, +2♥).",d:"Le mur vivant du Village : il encaisse, mange des blocs pour se renforcer et devient invulnérable en se reposant.",pw:["Gloutonnerie (Goinfrex) — mange un bloc faible : Cobblestone → Résistance I 1min, Terre → Force I 1min","Repos (Ronflex) — 5s immobile/sans attaque → 100 % soin + invulnérabilité [CD:300s]"],fb:"Ronflex lent (kitable à l'arc) ; Repos = fenêtre de 5 s sans attaquer."},
  {camp:"conseil",n:"Évoli",t:"L'Évolution au Choix",ev:"Normal → Eau / Électrik / Feu",hp:"8 → 10 → 12 ♥",passif:"Au Stade 1, faible mais polyvalent. À l'évolution, une Pierre Évolutive ouvre un menu où tu CHOISIS ta voie (définitif).",d:"Le Pokémon caméléon : tu décides toi-même de ton évolution parmi trois branches aux styles opposés.",pw:["Câlinerie (Stade 1) — projectile : Faiblesse I + Lenteur I 3s","💧 Aquali (tank) — Résistance I + Depth Strider ; Hydro-Pulse : jet 2♥ + recul","⚡ Voltali (burst) — Vitesse I ; Vive-Étincelle : dash 2♥ + paralysie 1,5s","🔥 Pyroli (offensif) — immunité feu + Fire Aspect ; Lance-Flammes : cône 2♥ + brûlure"],fb:"Fragile au Stade 1 ; le choix d'évolution est définitif (pas de retour)."},
  {camp:"conseil",n:"Magicarpe · Léviator",t:"Le Miracle Tardif",ev:"Eau → Eau / Vol",hp:"6 → 10 → 12 ♥",passif:"Type Eau → Eau/Vol. Magicarpe est quasi inoffensif (Faiblesse II permanente) mais évolue en ENCAISSANT des coups et en survivant — pas besoin de kills (jauge qui monte sous les coups). Léviator : Intimidation (Faiblesse I aux ennemis à 5 blocs), 10♥ puis 12♥.",d:"Le pari du serveur : une carpe inutile qui, si elle survit, se réveille en monstre dévastateur.",pw:["Saut (Magicarpe) — bond désespéré pour fuir, aucun dégât [CD:15s]","Hydro-Canon (Léviator) — torrent : 3♥ + KB massif [CD:45s]","Colère (Léviator) — Force III + Vitesse I 6s, puis Confusion 2s [CD:90s]","Méga-Léviator (Méga) — Eau/Ténèbres : Force II + Résistance I"],combo:"Méga-Léviator (Gemme) : Eau/Ténèbres — Force II + Résistance I + Intimidation renforcée (12 ♥).",fb:"Interminablement faible avant l'évolution : un Magicarpe tué tôt n'a rien."},
  /* ── TEAM ROCKET ── */
  {camp:"rocket",n:"Giovanni",t:"Le Boss",ev:"Dresseur · Sol",hp:"12 ♥",passif:"L'Autorité du Boss : les Rocket à <15 blocs gagnent Force I (+20 %). Quand un sbire fait un kill, tu régénères 2♥. Résistance I (−20 % subis). Immunisé à la corruption ; tu connais toute ta Team Rocket dès le départ.",d:"Le cerveau de la Team Rocket : il corrompt les Pokémon du Village pour les retourner contre leur propre camp.",pw:["Réseau Rocket (3 usages) — révèle si le joueur le plus proche est un Pokémon (corruptible) ou un Dresseur/Légendaire (immunisé), + son stade","Séisme — onde de choc 5 blocs : 3♥ + gros recul + Lenteur II 2s [CD:30s]","Corruption (1 Pokémon/partie) — quête : manger 5 pommes d'or + parcourir 1000 blocs + rester 5 min près de la cible (qui ne sait rien) → elle rejoint la Rocket en gardant son Pokémon ; à ta mort, 50 % qu'elle redevienne libre. Interdit sur Dresseurs & Légendaires"],lien:"Dirige toute la Team Rocket ; sa corruption peut briser le duo Sacha/Pikachu.",fb:"Dépend de ses sbires ; corruption lente/risquée ; cible n°1."},
  {camp:"rocket",n:"Jessie",t:"Le Duo de Choc",ev:"Dresseur · Poison",hp:"10 ♥ + Vitesse I",passif:"Lien Rocket : Résistance I tant qu'elle est à moins de 20 blocs de James. Si James meurt → Force I mais Faiblesse I en mêlée 5 min.",d:"Le cerveau colérique du duo. Elle empoisonne à distance et partage un coffre de gang en temps réel avec James.",pw:["Arbok, Crochet Venin — cible <12 blocs : 2♥ magiques + Poison II 6s [CD:60s]","Coffre de Gang (Montgolfière) — GUI 9 cases partagé en temps réel avec James : stockez CT/pommes d'or, transférez des items à distance"],lien:"Duo avec James (Résistance partagée). Quête commune : tuer Pikachu → +2♥ permanents pour TOUTE la Rocket + Force I 10 min.",fb:"Fragile loin de James ; binôme lisible ; sans Type (pas de météo)."},
  {camp:"rocket",n:"James",t:"Le Duo de Choc",ev:"Dresseur · Poison",hp:"10 ♥ + Vitesse I",passif:"Lien Rocket : Résistance I à moins de 20 blocs de Jessie. Si Jessie meurt → Force I mais Faiblesse I en mêlée 5 min.",d:"Le sensible imprévisible du duo. Il aveugle les ennemis dans un nuage et peut se sacrifier pour Jessie.",pw:["Smogogo, Purée de Pois — nuage 6 blocs : Cécité I + Lenteur II 5s (Jessie & toi immunisés) [CD:75s]","La Rose de James (1×/partie) — clic droit sur Jessie : sacrifie 3♥ max définitifs (Jessie → 13♥, toi → 7♥) ; incassable, liée à l'âme","Coffre de Gang partagé (9 cases, temps réel avec Jessie)"],lien:"Duo avec Jessie. Quête commune : tuer Pikachu → bonus pour toute la Rocket.",fb:"7♥ après la Rose = cible facile ; dépendant de Jessie."},
  {camp:"rocket",n:"Qulbutoké",t:"Le Bouclier Sacré",ev:"Psy",hp:"12 ♥ + Lenteur I",passif:"Type Psy (météo-neutre). 12♥, Lenteur I, immunité au recul. Riposte : 30 % de renvoyer 50 % des dégâts reçus en dégâts bruts. Objets : l'Enclume (Culbu-Pop) et l'Œil de l'Ender (Prélèvement Destin).",d:"Le garde du corps de Jessie & James : il encaisse, riposte et lie un ennemi à son propre destin.",pw:["Culbu-Pop (Enclume) — TP au milieu de Jessie & James [CD:120s]","Prélèvement Destin (Œil de l'Ender) — 8s : 100 % de TES dégâts subis sont infligés à la cible liée [CD:180s]"],lien:"Garde du Corps : Résistance I à Jessie & James (<15 blocs). À sa mort, le Duo gagne +4 absorption + Force I 45s.",fb:"Très lent, dégâts directs nuls, inutile loin du duo, riposte aléatoire."},
  {camp:"rocket",n:"Métamorph",t:"L'ADN Instable",ev:"Normal",hp:"10 ♥ (puis copie sa cible)",passif:"Type Normal (météo-neutre). Aucun bonus en forme neutre (fragile). Reste au chat Rocket même transformé. Objet : le Traqueur ADN.",d:"L'infiltré ultime : il file une cible puis devient sa copie parfaite — skin, pseudo, cœurs et pouvoirs.",pw:["Traqueur ADN — choisis 1 cible et reste 5 min cumulées à <20 blocs d'elle","Transformation — copie PERMANENTE : skin + pseudo + pouvoirs + stats + cœurs max de la cible","Démorphose — redevient neutre quand tu veux"],fb:"Fragile en neutre ; filature longue et risquée ; copier révèle qui il imite."},
  {camp:"rocket",n:"Miaouss · Persian",t:"La Fortune",ev:"Normal",hp:"12 ♥",passif:"Type Normal (météo-neutre). Chute amortie. Jackpot : Miaouss 15 % / Persian 25 % de chance par coup → une pépite d'or (+1 garantie par minerai or/diamant miné). Persian : Technicien (+3 % dégâts épée par 10 pépites portées, max +15 %). Objets : la Pièce d'Or (Marché Noir + évolution) et la Griffe (Combo-Griffes).",d:"L'arnaqueur Rocket : il amasse de l'or pour acheter au Marché Noir et frappe en combo.",pw:["Pièce d'Or (Miaouss) — ouvre le Marché Noir et suit ta progression ; à 64 pépites → évolution en Persian","Combo-Griffes (Miaouss) — 6s : +1 dégât brut/coup + Jackpot porté à 50 % [CD:120s]","Tranche (Persian) — pendant un Combo, tes coups infligent Wither I"],fb:"Faible en début de partie ; doit porter ses pépites (perdues à la mort)."},
  {camp:"rocket",n:"Absol",t:"Le Présage du Chaos",ev:"Ténèbres",hp:"12 ♥",passif:"Type Ténèbres : +15 % la nuit, −10 % le jour. 12♥, Vitesse I, Vision Nocturne. Prédiction : alerte sur ton Action Bar si un ennemi armé est à <25 blocs (non partagée). Opportuniste : chaque mort sur la map → Force I 15s. Objets : la Corne (Regard Noir) et le Quartz (Coupe Psycho).",d:"Le détecteur de la Rocket : il anticipe les menaces, maudit ses cibles et profite du chaos.",pw:["Regard Noir (Corne) — maudit une cible : Lenteur I + +15 % dégâts Rocket + révélée, 10s [CD:150s]","Coupe Psycho (Quartz) — lame 15 blocs : 3♥ + purge les potions positives [CD:90s]"],fb:"Info en solo (vocal utile), affaibli de jour, fragile."},
  {camp:"rocket",n:"Malosse · Démolosse",t:"Le Chasseur",ev:"Feu",hp:"10 → 12 ♥",passif:"Type Feu : +15 % sous Soleil, −10 % sous Pluie. Immunité Feu/Lave. Flair : un ennemi frappé à ≤6♥ devient une Proie → Vitesse I en courant vers elle (<30 blocs). Objets : le Collier (Crocs Feu) et le Charbon (Tricherie). Démolosse : Flammes Noires (coups enflamment 3 s) + 2♥ max.",d:"Le limier de la Rocket : il marque une proie, la brûle et la pourchasse sans répit.",pw:["Crocs Feu (Malosse) — marque une cible : brûle 6s + coords sur ton écran (anti-soin 8s à Démolosse)","Tricherie (Malosse) — vole le buff de Force (+2♥) ou inflige Cécité [CD:105s]","Flammes Noires (Démolosse) — tes coups enflamment 3s, +2♥ max ; Tricherie rechargée plus vite [CD:60s]"],fb:"10♥ en début ; dépend de proies basses ; −10 % sous la Pluie."},
  /* ── TEAM GALAXIE (cosmique) ── */
  {camp:"galaxie",n:"Hélio",t:"Le Maître Cosmique (Boss)",ev:"Cosmique",hp:"12 ♥",passif:"Type Cosmique — BOSS de la Team Galaxie. 12♥, Résistance I, Vision Nocturne. Objets : la Perle de l'Ender (Distorsion), l'Œil de l'Ender (Trou Noir), la Boule de Slime (Dôme) et la Balise (Ralliement).",d:"Le chef de la Team Galaxie : il manipule la gravité et le vide pour dominer l'espace de combat.",pw:["Distorsion (Perle de l'Ender) — aspire TOUS les ennemis à 10 blocs vers toi + Lenteur [CD:40s]","Trou Noir (Œil de l'Ender) — vide cosmique 4s : ennemis dans 6 blocs aspirés au centre + Wither + Cécité [CD:90s]","Dôme de Gravité (Boule de Slime) — vraie coupole de verre Ø24, 30s : Jump Boost à tous dedans, Force I à toi tant que tu y restes [CD:900s]","Ralliement Galactique (Balise) — 1×/partie (dès 50 min) : avertit la Galaxie puis, 30s après, téléporte toute l'équipe sur toi"],combo:"Trou Noir pour grouper → Dôme pour enfermer l'ennemi dans une arène.",lien:"Toute la Galaxie connaît son chef et ses alliés dès le départ.",fb:"La Galaxie joue seule contre tous les camps."},
  {camp:"galaxie",n:"Mars",t:"Commandante de l'Assaut",ev:"Cosmique",hp:"12 ♥",passif:"Type Cosmique — Commandante de l'Assaut (12♥). Rage de la Survivante : +Force quand tu as plus d'ennemis que d'alliés autour. Objets : la Boule de feu (Comète) et le Bâton de Blaze (Frappe Orbitale).",d:"La duelliste de la Galaxie, d'autant plus dangereuse qu'elle est en infériorité numérique.",pw:["Comète (Boule de feu) — dash-météore : dégâts de zone + knockback à l'impact [CD:35s]","Frappe Orbitale (Bâton de Blaze) — marque une cible → frappe du ciel 3s après (esquivable) [CD:90s]"],fb:"La Frappe Orbitale est télégraphiée."},
  {camp:"galaxie",n:"Jupiter",t:"Commandante du Contrôle",ev:"Cosmique",hp:"11 ♥",passif:"Type Cosmique — Commandante du Contrôle (11♥). Ancrage : knockback subi réduit de 50 %. Objets : l'Éclat de Prismarine (Champ Gravitationnel) et la Crème de Magma (Inversion).",d:"La maîtresse du terrain : elle gère le nombre adverse par le contrôle gravitationnel.",pw:["Champ Gravitationnel (Éclat de Prismarine) — zone 8 blocs : ennemis cloués au sol 4s (Lenteur IV + saut bloqué) [CD:45s]","Inversion (Crème de Magma) — projette une cible violemment en l'air (sépare un focus) [CD:30s]"],fb:"Peu de dégâts bruts."},
  {camp:"galaxie",n:"Saturne",t:"Le Scientifique",ev:"Cosmique",hp:"12 ♥",passif:"Type Cosmique — Le Scientifique (12♥). Aura de Soin : régénère légèrement les alliés Galaxie proches. Objets : le Lingot de Fer (Bouclier Plasma) et le Distributeur (Drone).",d:"Le soutien de la Galaxie : il maintient l'escouade en vie et déploie un drone de tir.",pw:["Bouclier Plasma (Lingot de Fer) — Résistance II à toi + alliés proches [CD:50s]","Drone Galactique (Distributeur) — pose un drone qui tire sur l'ennemi le plus proche 10s [CD:90s]"],fb:"Le drone est fragile et temporaire."},
  {camp:"galaxie",n:"Commando Galaxie",t:"Sbire Cosmique",ev:"Cosmique",hp:"9 ♥",passif:"Type Cosmique — soldat de la Team Galaxie (9♥). Objet : la Plume (Gravité Réduite).",d:"Le fantassin de la Team Galaxie : il protège Hélio et harcèle l'adversaire.",pw:["Gravité Réduite (Plume) — bond cosmique (grand saut propulsé) pour traquer ou fuir [CD:20s]"],fb:"Statistiques modestes."},
  /* ── LÉGENDAIRES (solo) ── */
  {camp:"legend",n:"Hoopa",t:"Le Voleur Dimensionnel",ev:"Spectre / Psy",hp:"14 ♥",passif:"Solitaire, immunisé à la corruption. Vitesse I, immunité chute. Aspire le loot de ses victimes dans son Miroir.",d:"Le légendaire voleur : il pille, ouvre des portails dimensionnels et finit par se déchaîner.",pw:["Dague d'Hoopa — épée en diamant incassable (liée à l'âme) ; 10% de te téléporter dans le dos de la cible touchée","Miroir des Ombres — coffre infini + Aspiration/Infiltration (stocke le loot aspiré)","Anneaux Dimensionnels — pose 2 portails bidirectionnels (jusqu'à 150 blocs, utilisables par tout le monde)","Vol Larcin — vole un item d'une cible (rendu après 5s)","Vase Scellé → Hoopa Déchaîné (forme surpuissante)"],fb:"Seul contre tous les camps."},
  {camp:"legend",n:"Volcanion",t:"La Fournaise de Vapeur",ev:"Feu / Eau",hp:"12 ♥",passif:"Type Feu/Eau : +15 % au Soleil ET sous Pluie. SOLO. 12♥, Force I, Depth Strider III, immunité Feu/Lave. Jauge de Pression : cours dans l'eau/lave pour la charger ; à 100 % (Surchauffe), tes coups mettent en feu (passif). Objets : l'Injecteur (Jet de Vapeur) et le Cristal Hydrique (Hydroblast).",d:"Le légendaire solitaire de la vapeur : il accumule sa pression dans l'eau pour des explosions dévastatrices.",pw:["Jet de Vapeur (Injecteur) — dôme de feu explosif 6 blocs : <100 % = recul + 2♥ ; à 100 % = 4♥ bruts + feu + toi +20 % Force 10s (consomme la jauge) [CD:120s]","Hydroblast (Cristal Hydrique) — vraie vague d'eau sur 12 blocs : Cécité I + recul [CD:90s]","Anti-Focus (passif) — 2 attaquants en <10s → jauge à 100 % + Résistance I 12s"],fb:"Solo sans soin, dépend de sa jauge et de l'eau, faible au sec."},
  {camp:"legend",n:"Mewtwo",t:"Le Pokémon Génétique",ev:"Psy",hp:"12 ♥",passif:"Légendaire SOLO à pleine puissance. Barrière Psychique ACTIVABLE (clic-droit ON/OFF) : un bouclier VISIBLE (anneau de particules) se régénère toutes les ~20s. Lévitation : pas de dégâts de chute. Immunisé à la corruption.",d:"Le boss ultime : télékinésie, rayons psychiques et une Méga-forme au choix. Seul contre tous.",pw:["Barrière Psychique — clic droit : active/désactive ton bouclier régénérant (visible, se régénère ~20s)","Télékinésie — clic : repousse une cible · Shift+clic : l'attire (15 blocs) [CD:25s]","Psyko — rayon psychique : 3♥ + Nausée + Cécité 3s [CD:35s]","Récupération — +4♥ + invisibilité 4s + clone-leurre RÉEL (ta tête + ton armure) [CD:60s]"],combo:"Jauge Méga (remplie sur les kills, +35%) → à 100 %, Gemme → choix Méga-Mewtwo X (mêlée Force II) ou Y (psy, Résistance + Régén).",fb:"Aucun allié ; vulnérable aux burst rapprochés (Ténèbres/Insecte)."},
  {camp:"legend",n:"Kyurem",t:"Le Dragon des Glaces Originel",ev:"Dragon / Glace",hp:"13 ♥",passif:"Dragon Originel : Résistance I + 10 % de dégâts contre les types Dragon. Pression (1×/10 min) : un coup fatal est annulé → cocon de glace + Régénération V 5s. Glaciation : chaque joueur a une barre 0→100 % (visible par Kyurem seul), +1 % par coup et via l'Ère ; chaque 10 % = +1 % de chance, par coup d'épée, de stun 0,5 s. Pointeau ADN & FUSION : dès le DÉBUT de la partie, Kyurem connaît les pseudos de Reshiram et Zekrom. Il doit récupérer le Pointeau ADN (qui apparaît dans un PokéStop OR — Kyurem est le seul prévenu de l'heure et du lieu) puis ÉLIMINER l'un d'eux pour fusionner. Fusion (une seule, non cumulable) : tuer Reshiram → KYUREM BLANC (Résistance Feu/Lave + Force I) ; tuer Zekrom → KYUREM NOIR (Vitesse II).",d:"Le légendaire de glace : il gèle le terrain, prive ses ennemis de leurs objets et perce d'un laser glacé. Seul contre tous — et s'il chasse les autres légendaires, il fusionne en Kyurem Blanc ou Noir.",pw:["Ère Glaciaire (Activable) — gèle un rayon de 30 blocs (Lenteur I) 2 min ; rester dedans → +1 % glaciation toutes les 2s [CD:300s]","Colère (Activable) — gèle les CT & objets des ennemis dans 50 blocs 1m30 (10 % : tu es confus, Lenteur I 30s) [CD:300s]","Laser Glace (Activable) — rayon bleu 25 blocs : 1,5♥ + gèle les blocs traversés [CD:180s]","Fusion BLANC (tue Reshiram) — Résistance Feu/Lave + Force I","Fusion NOIR (tue Zekrom) — Vitesse II"],fb:"Aucun allié ; vulnérable au burst rapproché (Feu/Combat) ; sans fusion, reste fragile face aux autres légendaires."},

       .replace(/(^|[\s(])r\s*=\s*([0-9]+)\b/gi,      (_,pre,n)=>{ badges.push('⌖ portée '+n); return pre; })
       .trim();

/* À quel stade appartient un pouvoir (d'après "(Stade N)" / "(Méga)" dans le texte). */
function powerStage(p){
  const s = String(p);
  if(/\(\s*M[ée]ga\s*\)/i.test(s) || /\bM[ée]ga[- ]/i.test(s)) return 'mega';
  const m = s.match(/\(\s*Stade\s*([123])\s*\)/i); if(m) return +m[1];
  return 0; // général (toutes formes)
}
function stripStage(p){
  return String(p).replace(/\s*\(\s*Stade\s*[123]\s*\)\s*/i,' ')
                  .replace(/\s*\(\s*M[ée]ga\s*\)\s*/i,' ')
                  .replace(/\s{2,}/g,' ').trim();
}
/* Stade d'un pouvoir EN TENANT COMPTE des noms de forme « (Chenipan) », « (Papilusion) »… */
function powerStageFor(p, stages){
  const s = String(p);
  if(/\(\s*M[ée]ga\s*\)/i.test(s) || /\bM[ée]ga[- ]/i.test(s)) return 'mega';
  const m = s.match(/\(\s*Stade\s*([123])\s*\)/i); if(m) return +m[1];
  for(let i=0;i<stages.length;i++){ const f=stages[i]; if(f && new RegExp('\\b'+f.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','i').test(s)) return i+1; }
  return 0;
}
/* Nettoie aussi les « (NomDeForme) » du texte affiché. */
function stripStageForms(p, stages){
  let s = stripStage(p);
  stages.forEach(f=>{ if(f) s = s.replace(new RegExp('\\s*\\(\\s*'+f.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\s*\\)','gi'),' '); });
  return s.replace(/\s{2,}/g,' ').trim();
}
/* PV par stade depuis "8 → 10 → 12 ♥". */
function splitHp(hp){
  if(!hp) return [];
  const heart = /♥/.test(hp) ? ' ♥' : '';
  return hp.replace(/♥/g,'').split(/→|->/).map(s=>s.trim()).filter(Boolean).map(s=>s+heart);
}
/* Répartit les phrases du passif par stade (selon le nom de la forme citée). */
function stagePassifs(passif, stages){
  const res = {general:[]}; stages.forEach((_,i)=>res[i]=[]);
  if(!passif) return res;
  passif.split(/(?<=[.!?])\s+/).map(s=>s.trim()).filter(Boolean).forEach(sen=>{
    let done=false;
    for(let i=0;i<stages.length;i++){
      const f=stages[i]; if(!f) continue;
      if(new RegExp('\\b'+f.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','i').test(sen)){ res[i].push(sen); done=true; break; }
    }
    if(!done){ const m=sen.match(/stade\s*([123])/i); if(m && res[+m[1]-1]){ res[+m[1]-1].push(sen); done=true; } }
    if(!done) res.general.push(sen);
  });
  return res;
}

function view404(){ return `<section class="max-w-3xl mx-auto px-5 py-32 text-center"><h1 class="font-serif text-5xl">404</h1><p class="muted mt-3">Cette page n'existe pas.</p><a href="#/" class="btn mt-6 inline-flex px-5 h-11 items-center rounded-lg text-white text-sm font-medium" style="background:var(--accent)">Retour à l'accueil</a></section>`; }

/* ───────── ROUTEUR ───────── */
const FILTER = {pokemon:{camp:'all',cat:'all'}, valkyrie:{camp:'all',cat:'all'}, naruto:{camp:'all',cat:'all'}};
function markActive(containerId, btn){
  const c=document.getElementById(containerId); if(!c||!btn)return;
  c.querySelectorAll('[role=tab]').forEach(b=>b.setAttribute('aria-selected','false'));
  btn.setAttribute('aria-selected','true');
}
function setCamp(modeId, key, btn){ FILTER[modeId].camp=key; markActive('tabs-'+modeId, btn); renderRoles(modeId); }
function setCat(modeId, cat, btn){ FILTER[modeId].cat=cat; markActive('cat-'+modeId, btn); renderRoles(modeId); }
function renderRoles(modeId){
  const f = FILTER[modeId] || {camp:'all',cat:'all'};
  const q = (document.getElementById('search-'+modeId)?.value || '').toLowerCase().trim();
  let list = DATA[modeId].roles.map((r,i)=>({r,i}));
  if(f.camp!=='all') list = list.filter(o=>o.r.camp===f.camp);
  if(modeId==='pokemon' && f.cat!=='all') list = list.filter(o=>roleCat(modeId,o.r).key===f.cat);
  if(q) list = list.filter(o=>{ const r=o.r; return (r.n+' '+r.t+' '+r.ev+' '+(r.d||'')+' '+(r.pw||[]).join(' ')+' '+(r.passif||'')).toLowerCase().includes(q); });
  const cont = document.getElementById('grid-'+modeId); if(!cont) return;
  const a = ACC[modeId];
  const sortFn = (x,y)=>{ const sx=roleStages(x.r).length, sy=roleStages(y.r).length; return sy-sx || x.r.n.localeCompare(y.r.n); };

  // Vue par DÉFAUT (aucun filtre/recherche) : regroupée par CAMP, en-tête clair par section.
  const grouped = f.camp==='all' && !q && !(modeId==='pokemon' && f.cat!=='all');
  if(grouped){
    cont.className = 'mt-2 space-y-12';
    let html = '';
    for(const [ck,c] of Object.entries(DATA[modeId].camps)){
      const items = list.filter(o=>o.r.camp===ck).sort(sortFn);
      if(!items.length) continue;
      html += `<div class="reveal">
        <div class="camphead flex items-center gap-3 py-3 mb-4 -mx-1 px-1 bd-b">
          <span class="campbar" style="background:${a}"></span>
          <div class="min-w-0">
            <div class="font-serif text-xl leading-tight">${esc(c.name)}</div>
            <div class="text-xs muted mt-0.5">${c.note?esc(c.note)+' · ':''}${items.length} rôle${items.length>1?'s':''}</div>
          </div>
        </div>
        <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">${items.map(o=>roleCard(modeId,o.i)).join('')}</div>
      </div>`;
    }
    cont.innerHTML = html;
  } else {
    cont.className = 'grid sm:grid-cols-2 lg:grid-cols-3 gap-4 mt-1';
    list.sort(sortFn);
    cont.innerHTML = list.map(o=>roleCard(modeId,o.i)).join('') || `<p class="muted col-span-full text-sm py-8 text-center">Aucun rôle ne correspond à ta recherche.</p>`;
  }
  const cnt = document.getElementById('count-'+modeId); if(cnt) cnt.textContent = list.length + ' rôle' + (list.length>1?'s':'');
  observe();
}
function route(){
  const h = (location.hash||'#/').replace(/^#/,'');
  const p = h.split('/').filter(Boolean); // ['mode','pokemon']...
  let html, navKey='';
  if(p.length===0){ html=viewHome(); }
  else if(p[0]==='modes'){ html=viewModes(); navKey='modes'; }
  else if(p[0]==='mode'&&p[1]){ html=viewMode(p[1]); navKey=p[1]; }
  else if(p[0]==='role'&&p[1]&&p[2]!=null){ html=viewRole(p[1],parseInt(p[2],10)); navKey=p[1]; }
  else if(p[0]==='arena'){ html=viewArena(); navKey='arena'; }
  else if(p[0]==='wiki'){ html=viewWiki(); navKey='wiki'; }
  else html=view404();
  app().innerHTML = html;
  document.querySelectorAll('[data-spy]').forEach(a=>a.classList.toggle('active', a.dataset.spy===navKey));
  // filtres réinitialisés sur une page de mode
  if(p[0]==='mode'&&DATA[p[1]]){ FILTER[p[1]]={camp:'all',cat:'all'}; renderRoles(p[1]); }
  window.scrollTo(0,0);
  observe();
}
window.addEventListener('hashchange', route);

/* ───────── DIVERS ───────── */
function toggleTheme(){ const d=document.documentElement.classList.toggle('dark'); localStorage.setItem('theme',d?'dark':'light'); }
function copyIP(btn){ navigator.clipboard.writeText(SERVER_IP).catch(()=>{}); const l=btn.querySelector('.ip-label')||(btn.classList.contains('ip-label')?btn:null); if(!l)return; const o=l.textContent; l.textContent='IP copiée ✓'; setTimeout(()=>l.textContent=o,1500); }
function observe(){ // révélation fiable au rendu (stagger léger), indépendante du scroll
  const els=[...document.querySelectorAll('.reveal:not(.in)')];
  els.forEach((e,i)=>setTimeout(()=>e.classList.add('in'), Math.min(i*45,260)));
}

let _statusDone=false;
route(); // rendu initial
</script>
